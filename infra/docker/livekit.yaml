port: 7880
bind_addresses:
  - '0.0.0.0'

rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: true
  # Accept TURN from our coturn sidecar. In dev leave these env vars unset and
  # the turn_servers block is effectively disabled (LiveKit will still work).
  turn_servers:
    - host: ${TURN_PUBLIC_HOST}
      port: 3478
      protocol: udp
      username: livekit
      credential: ${TURN_SHARED_SECRET}
      auth_type: shared_secret

# Screen content prefers efficient codecs — subscribers negotiate AV1/VP9
# transparently when supported, fall back to VP8/H264 otherwise.
codec:
  video:
    - mime: video/AV1
    - mime: video/VP9
    - mime: video/VP8
    - mime: video/H264
  audio:
    - mime: audio/opus

room:
  max_participants: 50
  empty_timeout: 300

# Do NOT let the SFU pause publishers when its BWE estimate dips — that is
# the other source of the 2–3 s screen-share pause loop.
congestion_control:
  enabled: true
  allow_pause: false

keys:
  ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}

logging:
  json: true
  level: info

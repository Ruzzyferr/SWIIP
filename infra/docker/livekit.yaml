port: 7880
bind_addresses:
  - '0.0.0.0'

rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: true
  turn_servers:
    - host: ${TURN_PUBLIC_HOST}
      port: 3478
      protocol: udp
      username: livekit
      credential: ${TURN_SHARED_SECRET}

room:
  max_participants: 50
  empty_timeout: 300

keys:
  ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}

logging:
  json: true
  level: info

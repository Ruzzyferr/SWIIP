# Swiip — Production Deploy (DigitalOcean Droplet)
# Usage:
#   docker compose -f infra/docker/docker-compose.deploy.yml --env-file .env.production up -d --build
#
# Voice (LiveKit):
#   docker compose -f infra/docker/docker-compose.deploy.yml --env-file .env.production --profile voice up -d --build
#
# Observability (Prometheus + Grafana + Loki):
#   docker compose -f infra/docker/docker-compose.deploy.yml --env-file .env.production --profile observability up -d

services:
  # ─── Application Services ────────────────────────────────────────────────

  api:
    image: ${IMAGE_REGISTRY:-ghcr.io/ruzzyferr/swiip}-api:${IMAGE_TAG:-latest}
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    container_name: swiip-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET:-swiip}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-25}
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILISEARCH_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-info@swiip.app}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-Swiip <info@swiip.app>}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      meilisearch:
        condition: service_started
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:4000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  gateway:
    image: ${IMAGE_REGISTRY:-ghcr.io/ruzzyferr/swiip}-gateway:${IMAGE_TAG:-latest}
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    container_name: swiip-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      API_INTERNAL_URL: http://api:4000
      MEDIA_SIGNALLING_URL: http://media-signalling:4002
      GATEWAY_PUBLIC_URL: ${PUBLIC_GATEWAY_URL:-wss://swiip.app/gateway}
      PORT: 4001
      MAX_CONNECTIONS: 10000
      HEARTBEAT_INTERVAL: 41250
      HEARTBEAT_TIMEOUT: 20000
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:4001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  web:
    image: ${IMAGE_REGISTRY:-ghcr.io/ruzzyferr/swiip}-web:${IMAGE_TAG:-latest}
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
        NEXT_PUBLIC_GATEWAY_URL: ${PUBLIC_GATEWAY_URL}
        NEXT_PUBLIC_CDN_URL: ${PUBLIC_CDN_URL:-}
    container_name: swiip-web
    restart: unless-stopped
    depends_on:
      - api
      - gateway

  workers:
    image: ${IMAGE_REGISTRY:-ghcr.io/ruzzyferr/swiip}-workers:${IMAGE_TAG:-latest}
    build:
      context: ../..
      dockerfile: services/workers/Dockerfile
    container_name: swiip-workers
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NATS_URL: nats://nats:4222
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET:-swiip}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILISEARCH_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      meilisearch:
        condition: service_started

  media-signalling:
    profiles: ["voice"]
    image: ${IMAGE_REGISTRY:-ghcr.io/ruzzyferr/swiip}-media:${IMAGE_TAG:-latest}
    build:
      context: ../..
      dockerfile: services/media-signalling/Dockerfile
    container_name: swiip-media-signalling
    restart: unless-stopped
    # LiveKit runs in host network mode (see livekit service), so the docker DNS
    # name `livekit` no longer resolves. Reach it via the host gateway instead.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      PORT: 4002
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      INTERNAL_TOKEN: ${JWT_SECRET}
      LIVEKIT_URL: http://host.docker.internal:7880
      LIVEKIT_WS_URL: ${LIVEKIT_WS_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
    depends_on:
      livekit:
        condition: service_started
      redis:
        condition: service_healthy

  livekit:
    profiles: ["voice"]
    image: livekit/livekit-server:latest
    container_name: swiip-livekit
    restart: unless-stopped
    # Host networking is required for WebRTC. Docker bridge MASQUERADE rewrites
    # outbound UDP source ports, breaking ICE's symmetric 5-tuple expectation —
    # ICE candidate pairs always fail (RTC connection timeout). With host mode,
    # LiveKit binds 7880/7881/7882 directly on the host so the advertised
    # `external_ip:port` matches the actual send/receive socket.
    network_mode: host
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
      TURN_PUBLIC_HOST: ${TURN_PUBLIC_HOST}
      TURN_SHARED_SECRET: ${TURN_SHARED_SECRET}
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml.tmpl:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed -e "s|\$${TURN_PUBLIC_HOST}|$$TURN_PUBLIC_HOST|g" \
            -e "s|\$${TURN_SHARED_SECRET}|$$TURN_SHARED_SECRET|g" \
            /etc/livekit.yaml.tmpl > /tmp/livekit.yaml
        exec /livekit-server --config /tmp/livekit.yaml --bind 0.0.0.0

  coturn:
    profiles: ["voice"]
    image: coturn/coturn:4.6-alpine
    container_name: swiip-coturn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    # NOTE: TURN_SHARED_SECRET is now used as the static long-term password
    # for the `livekit` user (matching what LiveKit sends literally), not as
    # a REST hashed secret. Same env var, different semantic.
    command: >
      -c /etc/coturn/turnserver.conf
      --external-ip=${TURN_PUBLIC_IP}
      --user=livekit:${TURN_SHARED_SECRET}

  # ─── Infrastructure ───────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c max_connections=100
      -c wal_level=replica
      -c archive_mode=on
      -c archive_command='cp %p /backups/wal/%f'
      -c log_min_duration_statement=500
      -c log_statement=none
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: swiip-nats
    restart: unless-stopped
    command: >
      --jetstream
      --store_dir /data
      --http_port 8222
    volumes:
      - nats_data:/data
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8222/healthz']
      interval: 15s
      timeout: 5s
      retries: 3

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: swiip-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-swiip-search-key}
      MEILI_NO_ANALYTICS: true
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:7700/health']
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Reverse Proxy ──────────────────────────────────────────────────────

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # LiveKit runs in host network mode, so its docker DNS entry is gone.
    # Caddy reverse-proxies /livekit through the host gateway instead.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./downloads:/srv/downloads:ro
    depends_on:
      - web
      - api
      - gateway

  # ─── Database Backup Cron ───────────────────────────────────────────────

  pg-backup:
    image: postgres:16-alpine
    container_name: swiip-pg-backup
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGUSER: ${DB_USER}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB_NAME}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET:-swiip}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-us-east-1}
    volumes:
      - ./backups:/backups
    entrypoint: /bin/sh
    command: >
      -c 'apk add --no-cache aws-cli &&
      mkdir -p /backups/daily /backups/wal &&
      if [ -n "$$S3_ACCESS_KEY" ] && [ -n "$$S3_SECRET_KEY" ] && [ -n "$$S3_ENDPOINT" ]; then
        aws configure set aws_access_key_id "$$S3_ACCESS_KEY";
        aws configure set aws_secret_access_key "$$S3_SECRET_KEY";
        aws configure set default.region "$$S3_REGION";
        S3_ENABLED=true;
        echo "[backup] S3 upload enabled";
      else
        S3_ENABLED=false;
        echo "[backup] S3 not configured, local-only backups";
      fi &&
      while true; do
        FILENAME="swiip_$(date +%Y%m%d_%H%M%S).sql.gz";
        FILEPATH="/backups/daily/$$FILENAME";
        pg_dump | gzip > "$$FILEPATH";
        echo "[backup] Created $$FILEPATH";
        if [ "$$S3_ENABLED" = "true" ]; then
          aws s3 cp "$$FILEPATH" "s3://$$S3_BUCKET/db-backups/daily/$$FILENAME" --endpoint-url "$$S3_ENDPOINT" && echo "[backup] Uploaded to S3" || echo "[backup] S3 upload FAILED";
        fi;
        find /backups/daily -name "*.sql.gz" -mtime +7 -delete;
        echo "[backup] Cleaned local backups older than 7 days. Sleeping 24h...";
        sleep 86400;
      done'
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Observability (optional) ──────────────────────────────────────────

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - '3001:3000'

  loki:
    profiles: ["observability"]
    image: grafana/loki:3.0.0
    restart: unless-stopped
    volumes:
      - loki_data:/loki

volumes:
  postgres_data:
  redis_data:
  nats_data:
  meilisearch_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  default:
    name: swiip-network

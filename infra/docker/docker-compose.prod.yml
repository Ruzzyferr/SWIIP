version: '3.9'

# ConstChat — Production Docker Compose
# Includes all application services + infrastructure.
# Use with environment-specific .env files.
#
# Usage:
#   docker compose -f infra/docker/docker-compose.prod.yml --env-file .env.production up -d

services:
  # ─── Application Services ────────────────────────────────────────────────

  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    container_name: constchat-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NATS_URL: ${NATS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PORT: 4000
    ports:
      - '4000:4000'
    depends_on:
      - postgres
      - redis
      - nats
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  gateway:
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    container_name: constchat-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 4001
      MAX_CONNECTIONS: ${MAX_CONNECTIONS:-10000}
    ports:
      - '4001:4001'
    depends_on:
      - redis
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4001/health']
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: constchat-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
      NEXT_PUBLIC_GATEWAY_URL: ${PUBLIC_GATEWAY_URL}
      NEXT_PUBLIC_CDN_URL: ${PUBLIC_CDN_URL}
    ports:
      - '3000:3000'
    depends_on:
      - api
      - gateway

  workers:
    build:
      context: ../..
      dockerfile: services/workers/Dockerfile
    container_name: constchat-workers
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NATS_URL: ${NATS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
    depends_on:
      - postgres
      - redis
      - nats

  # ─── Infrastructure ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: -js -m 8222 --max_payload 8MB
    volumes:
      - nats_data:/data

  nginx:
    image: nginx:1.26-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - api
      - gateway

volumes:
  postgres_data:
  redis_data:
  nats_data:

networks:
  default:
    name: constchat-prod-network

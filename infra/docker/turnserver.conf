listening-port=3478
tls-listening-port=5349
alt-listening-port=3479
alt-tls-listening-port=5350

listening-ip=0.0.0.0
relay-ip=0.0.0.0
min-port=49160
max-port=49200

# Long-term credentials only. LiveKit's `rtc.turn_servers` passes the
# static username/credential pair literally — it does NOT generate REST
# (use-auth-secret) creds — so coturn must accept the static pair.
# The actual `livekit:<password>` user is supplied via the --user CLI
# flag at container start so the password stays in .env, not on disk.
lt-cred-mech
realm=swiip.app

no-multicast-peers
no-cli
no-loopback-peers
fingerprint
mobility

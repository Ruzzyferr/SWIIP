<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #090b0b;
        color: #f5f7f6;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        border-radius: 12px;
        overflow: hidden;
        -webkit-app-region: drag;
        user-select: none;
      }
      .logo-img {
        width: 88px;
        height: 88px;
        margin-bottom: 20px;
        border-radius: 20px;
        object-fit: contain;
        box-shadow: 0 8px 32px rgba(16, 185, 129, 0.25);
      }
      .app-name {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 32px;
        background: linear-gradient(135deg, #6ee7b7, #34d399);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .status {
        font-size: 12px;
        color: #788682;
        margin-bottom: 16px;
        min-height: 16px;
        transition: opacity 0.3s;
      }
      .progress-container {
        width: 200px;
        height: 4px;
        background: #181e1d;
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #10b981, #34d399);
        border-radius: 2px;
        width: 0%;
        transition: width 0.3s ease;
      }
      .progress-bar.indeterminate {
        width: 40%;
        animation: indeterminate 1.5s ease-in-out infinite;
      }
      @keyframes indeterminate {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(500%);
        }
      }
      .spinner {
        width: 24px;
        height: 24px;
        border: 2.5px solid #181e1d;
        border-top: 2.5px solid #34d399;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 16px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <img class="logo-img" src="../build/icon.png" alt="Swiip" width="88" height="88" />
    <div class="app-name">Swiip</div>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Checking for updates...</div>
    <div class="progress-container">
      <div class="progress-bar indeterminate" id="progress"></div>
    </div>
    <script>
      window.updateSplash = function (data) {
        const status = document.getElementById('status');
        const progress = document.getElementById('progress');
        const spinner = document.getElementById('spinner');
        if (data.status) status.textContent = data.status;
        if (data.percent !== undefined) {
          progress.classList.remove('indeterminate');
          progress.style.width = data.percent + '%';
        }
        if (data.hideSpinner) spinner.style.display = 'none';
      };
    </script>
  </body>
</html>

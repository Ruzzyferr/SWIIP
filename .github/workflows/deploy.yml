name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ruzzyferr/swiip

jobs:
  # ── Build all Docker images in parallel ──────────────────────
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-api:latest,${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-gateway:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: services/gateway/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-gateway:latest,${{ env.IMAGE_PREFIX }}-gateway:${{ github.sha }}
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-web:latest,${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_GATEWAY_URL=${{ vars.NEXT_PUBLIC_GATEWAY_URL }}
            NEXT_PUBLIC_CDN_URL=${{ vars.NEXT_PUBLIC_CDN_URL }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-workers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: services/workers/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-workers:latest,${{ env.IMAGE_PREFIX }}-workers:${{ github.sha }}
          cache-from: type=gha,scope=workers
          cache-to: type=gha,mode=max,scope=workers

  build-media:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: services/media-signalling/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-media:latest,${{ env.IMAGE_PREFIX }}-media:${{ github.sha }}
          cache-from: type=gha,scope=media
          cache-to: type=gha,mode=max,scope=media

  # ── Deploy to server ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-api, build-gateway, build-web, build-workers, build-media]
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd /opt/ConstChat
            git checkout -- .
            git pull origin master

            # Pull new images
            docker compose -f infra/docker/docker-compose.deploy.yml --env-file .env.production pull api gateway web workers media-signalling

            # Run migrations
            docker compose -f infra/docker/docker-compose.deploy.yml --env-file .env.production run --rm api migrate || true

            # Restart services with new images (zero-downtime for stateless services)
            docker compose -f infra/docker/docker-compose.deploy.yml --env-file .env.production --profile voice up -d api gateway web workers media-signalling livekit coturn

            # Cleanup old images
            docker image prune -f --filter "until=24h" > /dev/null 2>&1

            echo "Deploy complete!"

name: Desktop Release

on:
  push:
    branches: [master]
    paths:
      - 'apps/desktop/**'
      - '.github/workflows/desktop-release.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build NSIS installer
        run: pnpm --filter @constchat/desktop run build:installer

      - name: Compute installer metadata
        id: metadata
        shell: pwsh
        run: |
          $pkg = Get-Content "apps/desktop/package.json" | ConvertFrom-Json
          $version = $pkg.version
          $artifact = "apps/desktop/dist/Swiip-Setup-$version.exe"
          if (!(Test-Path $artifact)) {
            throw "Installer not found at $artifact"
          }
          $sha = (Get-FileHash -Path $artifact -Algorithm SHA256).Hash.ToLower()
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "artifact_path=$artifact" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "sha256=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: desktop-installer
          path: ${{ steps.metadata.outputs.artifact_path }}
          if-no-files-found: error

      - name: Upload metadata artifact
        shell: pwsh
        run: |
          $content = @"
          VERSION=${{ steps.metadata.outputs.version }}
          SHA256=${{ steps.metadata.outputs.sha256 }}
          "@
          $content | Out-File -FilePath "installer-metadata.env" -Encoding ascii
      - name: Upload metadata artifact file
        uses: actions/upload-artifact@v6
        with:
          name: desktop-installer-metadata
          path: installer-metadata.env
          if-no-files-found: error

  publish-installer:
    runs-on: ubuntu-latest
    needs: build-installer
    env:
      # Same names as Build & Deploy (deploy.yml uses appleboy/ssh-action with these).
      SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
      SSH_USER: ${{ secrets.SERVER_SSH_USER }}
    steps:
      # GitHub does not reliably evaluate secrets.* == '' in step `if:`; use env boolean instead.
      - name: Verify SSH secrets are configured
        env:
          SSH_SECRETS_OK: ${{ secrets.SERVER_SSH_KEY != '' && secrets.SERVER_HOST != '' }}
        run: |
          if [ "$SSH_SECRETS_OK" != "true" ]; then
            echo '::error::Set SERVER_SSH_KEY and SERVER_HOST (same secrets as the Build & Deploy workflow). Optional: SERVER_SSH_USER (default root), SERVER_SSH_PORT (default 22).'
            exit 1
          fi

      - name: Download installer artifact
        uses: actions/download-artifact@v6
        with:
          name: desktop-installer
          path: dist

      - name: Download metadata artifact
        uses: actions/download-artifact@v6
        with:
          name: desktop-installer-metadata
          path: dist

      - name: Load metadata
        run: |
          set -euo pipefail
          source dist/installer-metadata.env
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "EXPECTED_SHA256=$SHA256" >> "$GITHUB_ENV"

      - name: Prepare SSH key
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          # Trailing newline matters for OpenSSH when the secret was pasted without a final \n
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          HOST="${{ secrets.SERVER_HOST }}"
          PORT="${SSH_PORT:-22}"
          if ! ssh-keyscan -o ConnectTimeout=15 -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts 2>/tmp/keyscan.err; then
            echo "::error::ssh-keyscan failed for SERVER_HOST port ${PORT} (DNS, firewall, or wrong host/port). $(tr '\n' ' ' </tmp/keyscan.err)"
            exit 1
          fi

      - name: Upload installer to production downloads
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          REMOTE_USER="${SSH_USER:-root}"
          HOST="${{ secrets.SERVER_HOST }}"
          INSTALLER_PATH="$(ls dist/Swiip-Setup-*.exe | head -n 1)"
          scp -P "$PORT" "$INSTALLER_PATH" "${REMOTE_USER}@${HOST}:/opt/ConstChat/infra/docker/downloads/Swiip-Setup-${VERSION}.exe"

      - name: Promote latest installer and generate update manifest
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          REMOTE_USER="${SSH_USER:-root}"
          HOST="${{ secrets.SERVER_HOST }}"
          INSTALLER="Swiip-Setup-${VERSION}.exe"
          ssh -p "$PORT" "${REMOTE_USER}@${HOST}" bash -s <<REMOTE_EOF
            set -euo pipefail
            cd /opt/ConstChat/infra/docker/downloads
            cp -f "${INSTALLER}" Swiip-Setup-latest.exe
            sha256sum Swiip-Setup-latest.exe | awk '{print \$1}' > Swiip-Setup-latest.exe.sha256
            SIZE=\$(stat -c%s "${INSTALLER}")
            SHA512=\$(sha512sum "${INSTALLER}" | awk '{print \$1}')
            cat > latest.yml <<YML
          version: ${VERSION}
          files:
            - url: Swiip-Setup-${VERSION}.exe
              sha512: \${SHA512}
              size: \${SIZE}
          path: Swiip-Setup-${VERSION}.exe
          sha512: \${SHA512}
          releaseDate: $(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          YML
          REMOTE_EOF

      - name: Verify remote hash matches build hash
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          REMOTE_USER="${SSH_USER:-root}"
          HOST="${{ secrets.SERVER_HOST }}"
          REMOTE_SHA="$(ssh -p "$PORT" "${REMOTE_USER}@${HOST}" "cat /opt/ConstChat/infra/docker/downloads/Swiip-Setup-latest.exe.sha256")"
          test "$REMOTE_SHA" = "$EXPECTED_SHA256"

      - name: Smoke check latest installer URL
        run: |
          set -euo pipefail
          STATUS="$(curl -s -o /dev/null -w "%{http_code}" https://swiip.app/downloads/Swiip-Setup-latest.exe)"
          test "$STATUS" = "200"

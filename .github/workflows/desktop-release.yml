name: Desktop Release

on:
  push:
    branches: [master]
    paths:
      - 'apps/desktop/**'
      - '.github/workflows/desktop-release.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build NSIS installer
        run: pnpm --filter @constchat/desktop run build:installer

      - name: Compute installer metadata
        id: metadata
        shell: pwsh
        run: |
          $pkg = Get-Content "apps/desktop/package.json" | ConvertFrom-Json
          $version = $pkg.version
          $artifact = "apps/desktop/dist/Swiip-Setup-$version.exe"
          if (!(Test-Path $artifact)) {
            throw "Installer not found at $artifact"
          }
          $sha = (Get-FileHash -Path $artifact -Algorithm SHA256).Hash.ToLower()
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "artifact_path=$artifact" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "sha256=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: desktop-installer
          path: ${{ steps.metadata.outputs.artifact_path }}
          if-no-files-found: error

      - name: Upload metadata artifact
        shell: pwsh
        run: |
          $content = @"
          VERSION=${{ steps.metadata.outputs.version }}
          SHA256=${{ steps.metadata.outputs.sha256 }}
          "@
          $content | Out-File -FilePath "installer-metadata.env" -Encoding ascii
      - name: Upload metadata artifact file
        uses: actions/upload-artifact@v6
        with:
          name: desktop-installer-metadata
          path: installer-metadata.env
          if-no-files-found: error

  publish-installer:
    runs-on: ubuntu-latest
    needs: build-installer
    # Same secret scope and SSH stack as Build & Deploy (deploy.yml deploy job).
    environment: production
    steps:
      - name: Verify SSH secrets are configured
        env:
          SSH_SECRETS_OK: ${{ secrets.SERVER_SSH_KEY != '' && secrets.SERVER_HOST != '' }}
        run: |
          if [ "$SSH_SECRETS_OK" != "true" ]; then
            echo '::error::Set SERVER_SSH_KEY and SERVER_HOST (same secrets as the Build & Deploy workflow).'
            exit 1
          fi

      - name: Download installer artifact
        uses: actions/download-artifact@v6
        with:
          name: desktop-installer
          path: dist

      - name: Download metadata artifact
        uses: actions/download-artifact@v6
        with:
          name: desktop-installer-metadata
          path: dist

      - name: Load metadata
        run: |
          set -euo pipefail
          source dist/installer-metadata.env
          VERSION="${VERSION//$'\r'/}"
          SHA256="${SHA256//$'\r'/}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "EXPECTED_SHA256=$SHA256" >> "$GITHUB_ENV"

      - name: Stage installer for SCP
        run: |
          set -euo pipefail
          src=$(ls dist/Swiip-Setup-*.exe | head -n 1)
          dest="dist/Swiip-Setup-${VERSION}.exe"
          if [ "$src" != "$dest" ]; then cp -f "$src" "$dest"; fi

      - name: Upload installer to production downloads
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: dist/Swiip-Setup-${{ env.VERSION }}.exe
          target: /opt/ConstChat/infra/docker/downloads/
          strip_components: 1

      - name: Promote latest, write latest.yml, verify SHA256
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            VERSION='${{ env.VERSION }}'
            EXPECTED_SHA256='${{ env.EXPECTED_SHA256 }}'
            cd /opt/ConstChat/infra/docker/downloads
            INSTALLER="Swiip-Setup-${VERSION}.exe"
            cp -f "${INSTALLER}" Swiip-Setup-latest.exe
            sha256sum Swiip-Setup-latest.exe | awk '{print $1}' > Swiip-Setup-latest.exe.sha256
            REMOTE_SHA=$(cat Swiip-Setup-latest.exe.sha256)
            test "$REMOTE_SHA" = "$EXPECTED_SHA256"
            SIZE=$(stat -c%s "${INSTALLER}")
            SHA512=$(sha512sum "${INSTALLER}" | awk '{print $1}')
            RELEASE_DATE=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
            {
              echo "version: ${VERSION}"
              echo "files:"
              echo "  - url: Swiip-Setup-${VERSION}.exe"
              echo "    sha512: ${SHA512}"
              echo "    size: ${SIZE}"
              echo "path: Swiip-Setup-${VERSION}.exe"
              echo "sha512: ${SHA512}"
              echo "releaseDate: ${RELEASE_DATE}"
            } > latest.yml

      - name: Smoke check latest installer URL
        run: |
          set -euo pipefail
          STATUS="$(curl -s -o /dev/null -w "%{http_code}" https://swiip.app/downloads/Swiip-Setup-latest.exe)"
          test "$STATUS" = "200"
